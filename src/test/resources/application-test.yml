spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5433/postgres}
    username: ${TEST_DB_USER:postgres}
    password: ${TEST_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

auth:
  jwt:
    secret: test-jwt-secret-key-for-postgres-tests-123456
    access-token-ttl: PT15M
    refresh-token-ttl: P7D
