spring:
  application:
    name: DiagnosticServiceAI
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:diagnostic_ai}}
    username: ${DB_USER:diagnostic}
    password: ${DB_PASSWORD:diagnostic}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

auth:
  jwt:
    secret: ${JWT_SECRET:change-this-dev-jwt-secret-to-a-long-random-value}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT15M}
    refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:P7D}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}
  docker:
    project-label: ${DOCKER_PROJECT_LABEL:ai.project.env}
    project-label-value: ${DOCKER_PROJECT_LABEL_VALUE:demo}
    logs-tail: ${DOCKER_LOGS_TAIL:200}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    prompt-version: ${GEMINI_PROMPT_VERSION:v1}
