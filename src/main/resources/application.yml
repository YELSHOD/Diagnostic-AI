spring:
  application:
    name: DiagnosticServiceAI
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:diagnostic_ai}}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:123}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true

logging:
  file:
    name: ${APP_LOG_FILE:./logs/diagnosticserviceai.log}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

auth:
  jwt:
    secret: ${JWT_SECRET:change-this-dev-jwt-secret-to-a-long-random-value}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT15M}
    refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:P7D}

app:
  database:
    auto-create: ${DB_AUTO_CREATE:true}
    maintenance-database: ${DB_MAINTENANCE_NAME:postgres}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}
  docker:
    enabled: ${DOCKER_DISCOVERY_ENABLED:false}
    project-label: ${DOCKER_PROJECT_LABEL:ai.project.env}
    project-label-value: ${DOCKER_PROJECT_LABEL_VALUE:demo}
    logs-tail: ${DOCKER_LOGS_TAIL:200}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    prompt-version: ${GEMINI_PROMPT_VERSION:v1}
    auto-diagnosis-enabled: ${GEMINI_AUTO_DIAGNOSIS_ENABLED:false}
  runtime:
    default-local-targets:
      - name: diagnosticserviceai
        host: localhost
        port: 8080
        health-url: http://localhost:8080/actuator/health
        log-source-type: FILE_TAIL
        log-source-ref: ./logs/diagnosticserviceai.log
      - name: orders-demo
        host: localhost
        port: 8080
        health-url: http://localhost:8080/actuator/health
        log-source-type: FILE_TAIL
        log-source-ref: ${ORDERS_DEMO_LOG_FILE:./logs/orders-demo.log}
      - name: restaurant-demo
        host: localhost
        port: 8080
        health-url: http://localhost:8080/actuator/health
        log-source-type: FILE_TAIL
        log-source-ref: ${RESTAURANT_DEMO_LOG_FILE:./logs/restaurant-demo.log}
      - name: delivery-demo
        host: localhost
        port: 8080
        health-url: http://localhost:8080/actuator/health
        log-source-type: FILE_TAIL
        log-source-ref: ${DELIVERY_DEMO_LOG_FILE:./logs/delivery-demo.log}
  demo:
    enabled: false
    auto-start: false
    step-delay-ms: 900
    orders-log-file: ${ORDERS_DEMO_LOG_FILE:./logs/orders-demo.log}
    restaurant-log-file: ${RESTAURANT_DEMO_LOG_FILE:./logs/restaurant-demo.log}
    delivery-log-file: ${DELIVERY_DEMO_LOG_FILE:./logs/delivery-demo.log}
