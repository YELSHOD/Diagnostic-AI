spring:
  application:
    name: DiagnosticServiceAI
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/diagnostic}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  docker:
    project-label: ${DOCKER_PROJECT_LABEL:ai.project.env}
    project-label-value: ${DOCKER_PROJECT_LABEL_VALUE:demo}
    logs-tail: ${DOCKER_LOGS_TAIL:200}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    prompt-version: ${GEMINI_PROMPT_VERSION:v1}
