spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:diagnostic_ai}}
    username: ${DB_USER:diagnostic}
    password: ${DB_PASSWORD:diagnostic}

logging:
  file:
    name: ${APP_LOG_FILE:./logs/diagnosticserviceai.log}

app:
  docker:
    project-label: ${DOCKER_PROJECT_LABEL:ai.project.env}
    project-label-value: ${DOCKER_PROJECT_LABEL_VALUE:demo}
    logs-tail: ${DOCKER_LOGS_TAIL:200}
  runtime:
    default-local-targets:
      - name: diagnostic-ai-front
        host: localhost
        port: 5173
        health-url: http://localhost:5173
        log-source-type: FILE_TAIL
        log-source-ref: ./logs/diagnostic-ai-front.log
